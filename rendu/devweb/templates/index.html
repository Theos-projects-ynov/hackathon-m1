<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TechCorp Financial Assistant</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="app" id="app">
    <header class="topbar">
      <div class="title">
        <span class="logo" aria-hidden="true">TC</span>
        <div>
          <h1>TechCorp Financial Assistant</h1>
          <span class="model-name">{{ model }}</span>
        </div>
      </div>
      <div class="topbar-actions">
        <div class="status" id="status">
          <span class="dot" id="status-dot"></span>
          <span id="status-text">V&eacute;rification...</span>
        </div>
        <button type="button" class="icon-btn" id="theme-btn" aria-label="Basculer le th&egrave;me" title="Th&egrave;me clair / sombre">
          <svg class="icon-moon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
          <svg class="icon-sun" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
        </button>
        <button type="button" class="icon-btn" id="new-chat-btn" aria-label="Nouvelle conversation" title="Nouvelle conversation">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>
        </button>
      </div>
    </header>

    <div class="offline-banner" id="offline-banner" hidden>
      <div class="offline-inner">
        <strong id="offline-title">Serveur Ollama injoignable</strong>
        <p id="offline-desc">D&eacute;marrez Ollama puis cr&eacute;ez le mod&egrave;le financier :</p>
        <pre><code id="offline-cmd">ollama serve
ollama create phi3-financial -f ollama_server/Modelfile</code></pre>
      </div>
    </div>

    <main class="chat" id="chat" aria-live="polite"></main>

    <form class="composer" id="composer">
      <textarea id="input" placeholder="&Eacute;crivez votre message..." rows="1" required></textarea>
      <button type="submit" id="send-btn" aria-label="Envoyer">
        <span>Envoyer</span>
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M5 12h13M13 6l6 6-6 6" />
        </svg>
      </button>
      <button type="button" class="stop" id="stop-btn" aria-label="Arr&ecirc;ter la g&eacute;n&eacute;ration" hidden>
        <span>Stop</span>
        <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="7" y="7" width="10" height="10" rx="2" fill="currentColor" stroke="none"/></svg>
      </button>
    </form>
  </div>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
